name: CI / Deploy Pages

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate site sources
        run: |
          set -euo pipefail
          node --check app.js
          test -f index.html
          test -f style.css
          test -f app.js
          test -f docs/index.md

      - name: Assemble static site
        run: |
          set -euo pipefail
          mkdir -p dist
          cp index.html style.css app.js dist/
          cp -R docs dist/docs
          touch dist/.nojekyll

      - name: Smoke test static site
        run: |
          set -euo pipefail
          cd dist
          python3 -m http.server 8000 --bind 127.0.0.1 >/tmp/pages-server.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          sleep 2
          curl --fail --silent http://127.0.0.1:8000/ >/dev/null
          curl --fail --silent http://127.0.0.1:8000/app.js >/dev/null
          curl --fail --silent http://127.0.0.1:8000/docs/index.md >/dev/null
          curl --fail --silent http://127.0.0.1:8000/docs/labs/thread/ch2.md >/dev/null

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
